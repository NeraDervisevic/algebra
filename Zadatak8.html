<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 8</title>
</head>

<body>

    <form name="Form" action="" method="post" enctype="multipart/form-data" autocomplete="off">

        <p>
            <label for="ime">Ime i prezime<sup>*</sup></label><br>
            <input id="ime" name="imeprezime" type="text" placeholder="Vaše ime i prezime" size="30" required>
        </p>
        <p>
            <label for="email">E-mail adresa</label><br>
            <input id="email" name="mailadresa" type="email" placeholder="Upišite valjanu e-mail adresu" size="30"
                required>
        </p>
        <p>
            <label for="phonenumber">Kontakt broj telefona</label><br>
            <input id="phonenumber" name="telefon" type="tel" size="30">
        </p>
        <p>
            <label for="dob">Datum rođenja</label><br>
            <input id="dob" name="datumrodenja" type="date" size="30">
        </p>
        <p>
            Koje jezike govorite?<br>
            <input id="engleski" name="eng" value="1" type="checkbox">
            <label for="engleski">Engleski</label>

            <input id="talijanski" name="tal" value="2" type="checkbox">
            <label for="talijanski">Talijanski</label>

            <input id="njemacki" name="njem" value="3" type="checkbox">
            <label for="njemacki">Njemački</label>

            <input id="francuski" name="fra" value="4" type="checkbox">
            <label for="francuski">Francuski</label>

            <input id="spanjolski" name="spanj" value="5" type="checkbox">
            <label for="spanjolski">Španjolski</label>
        </p>
        <p>
            Da li ste do sada koristili usluge naše tvrtke?<br>
            <input id="yes" name="upit" value="1" type="radio">
            <label for="yes">Da</label>

            <input id="no" name="upit" value="2" type="radio">
            <label for="no">Da</label>
        </p>
        <p>
            <label for="dokument">Priložite životopis</label><br>
            <input id="dokument" name="doc" type="file">
        </p>
        <p>
            <input name="reset" type="reset" value="Poništi">
            <input name="submit" type="submit" value="Prijavi se">
        </p>


    </form>
</body>

</html>
